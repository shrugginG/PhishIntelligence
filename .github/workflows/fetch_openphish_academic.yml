name: Fetch OpenPhish Academic (every 15 min)

# Routine incremental fetch from OpenPhish Academic feed.csv (24h rolling).
# Cron matches source cadence: openphish/academic repo commits every 15 min
# (verified: 411 days history, 34925 commits, 100% on 15-min cadence).
# Anchor: SELECT MAX(discover_time) FROM raw_openphish_academic.
# Short-circuit break on iso <= anchor (feed.csv is strictly desc).

on:
  schedule:
    - cron: '8,23,38,53 * * * *'   # :08 :23 :38 :53 — 错开整点 GH Actions 拥堵 + 与 PhishTank :17 错开
  workflow_dispatch: {}

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run OpenPhish Academic routine fetch
        run: uv run python -m src.sources.openphish_academic
        env:
          SUPABASE_DB_URL:        ${{ secrets.SUPABASE_DB_URL }}
          OPENPHISH_GITHUB_USER:  ${{ secrets.OPENPHISH_GITHUB_USER }}
          OPENPHISH_GITHUB_PAT:   ${{ secrets.OPENPHISH_GITHUB_PAT }}
